name: refresh

# Weekly server-side poll of Europe PMC for the latest CTCL papers. Runs even
# when no one's computer is on, summarizes new papers with Claude (if the
# ANTHROPIC_API_KEY secret is set — otherwise an abstract excerpt is used), and
# commits data.json only when something changed. Switch to daily by changing the
# cron to '17 13 * * *'.
on:
  schedule:
    - cron: '17 13 * * 1'   # Mondays 13:17 UTC (~06:17 PT)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests anthropic
      - name: Refresh data.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_papers.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "ci: refresh CTCL papers $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no change"
          fi
