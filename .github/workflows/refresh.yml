name: refresh

# Weekly server-side poll of Europe PMC for the latest CTCL papers. Runs even
# when no one's computer is on, writes plain-language summaries + the takeaways
# using whichever key is set — GROQ_API_KEY (free open-weights Llama, no card)
# or ANTHROPIC_API_KEY (preferred if both); with neither, an abstract excerpt is
# used. Commits data.json only when something changed. Switch to daily via cron.
on:
  schedule:
    - cron: '17 13 * * 1'   # Mondays 13:17 UTC (~06:17 PT)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests anthropic
      - name: Refresh data.json
        env:
          # summaries try providers in order: Anthropic (if set) → Groq →
          # OpenRouter → Cerebras. Add any of the extra keys to survive an outage.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: python scripts/fetch_papers.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "ci: refresh CTCL papers $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no change"
          fi
