<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CTCL Literature Tracker · hlash99</title>
<style>
  :root{--bg:#0f1115;--surface:#171a21;--surface2:#1e222b;--line:#272c36;--ink:#e9ecf1;--muted:#9aa3af;--accent:#6ea8fe;--new:#3ad29f;--pre:#e0a458;}
  @media (prefers-color-scheme: light){
    :root{--bg:#f6f7f9;--surface:#ffffff;--surface2:#f0f2f5;--line:#e3e6ea;--ink:#1a1d21;--muted:#5f6772;--accent:#185FA5;--new:#13855f;--pre:#9a6411;}
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:900px;margin:0 auto;padding:40px 20px 90px}
  .crumb{font-size:13px;color:var(--muted);margin-bottom:8px}
  h1{font-size:28px;margin:0 0 4px;font-weight:700;letter-spacing:-.5px}
  .sub{color:var(--muted);margin:0;font-size:14.5px}
  .kpis{display:flex;gap:26px;flex-wrap:wrap;margin:18px 0 4px}
  .kpi .v{font-size:22px;font-weight:700;line-height:1.1}
  .kpi .l{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:26px 0 6px}
  input[type=search]{flex:1;min-width:180px;background:var(--surface);border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;color:var(--ink);font-size:14px;outline:none}
  input[type=search]:focus{border-color:var(--accent)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:var(--surface);color:var(--muted);border:0;padding:8px 13px;font-size:12.5px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff}
  /* plain-language takeaways */
  .tldr-btn{display:flex;align-items:center;gap:9px;width:100%;margin:20px 0 0;
    background:linear-gradient(135deg,rgba(62,201,196,.12),rgba(62,201,196,.04));
    border:1px solid var(--accent);color:var(--ink);border-radius:12px;padding:13px 16px;
    font-size:14.5px;font-weight:600;cursor:pointer;text-align:left;transition:background .15s}
  .tldr-btn:hover{background:linear-gradient(135deg,rgba(62,201,196,.2),rgba(62,201,196,.07))}
  .tldr-ic{font-size:17px;flex:none}
  .tldr-chev{margin-left:auto;color:var(--muted);transition:transform .2s}
  .tldr-btn[aria-expanded="true"] .tldr-chev{transform:rotate(180deg)}
  .tldr-panel{border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;
    background:var(--surface);padding:6px 20px 16px;margin-bottom:6px}
  .tldr-panel ul{margin:10px 0 0;padding:0;list-style:none}
  .tldr-panel li{position:relative;padding:8px 0 8px 24px;font-size:14px;line-height:1.55;
    border-bottom:1px solid var(--line)}
  .tldr-panel li:last-child{border-bottom:none}
  .tldr-panel li::before{content:"→";position:absolute;left:2px;color:var(--accent);font-weight:700}
  .tldr-cap{font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.5}
  .tldr-act{color:var(--accent);cursor:pointer;text-decoration:none}
  .tldr-act:hover{text-decoration:underline}
  .count{font-size:12.5px;color:var(--muted);margin:14px 0 4px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:12px 0}
  .card h3{margin:0 0 6px;font-size:16.5px;font-weight:650;line-height:1.35}
  .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--muted);margin-bottom:9px}
  .meta .j{color:var(--ink);font-weight:600}
  .badge{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-radius:20px;padding:2px 8px;border:1px solid}
  .badge.new{color:var(--new);border-color:var(--new)}
  .badge.pre{color:var(--pre);border-color:var(--pre)}
  .summary{font-size:14.5px;margin:0 0 8px}
  .src{font-size:11px;color:var(--muted);margin-top:2px}
  details{margin-top:6px}
  summary{cursor:pointer;font-size:12.5px;color:var(--accent);list-style:none}
  summary::-webkit-details-marker{display:none}
  summary::before{content:"▸ ";color:var(--muted)}
  details[open] summary::before{content:"▾ "}
  .abstract{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.55}
  .authors{font-size:12px;color:var(--muted);margin-top:8px;font-style:italic}
  footer{margin-top:46px;color:var(--muted);font-size:12px;text-align:center;line-height:1.7}
  .err{color:var(--pre);font-size:14px}
  @media (max-width:560px){.wrap{padding:26px 14px 70px}h1{font-size:23px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="crumb"><a href="https://hlash99.github.io/">← hlash99 dashboard</a></div>
  <h1>CTCL Literature Tracker</h1>
  <p class="sub" id="sub">Latest papers on cutaneous T-cell lymphoma — auto-collected &amp; summarized.</p>

  <div class="kpis" id="kpis"></div>

  <button id="tldrBtn" class="tldr-btn" style="display:none" aria-expanded="false">
    <span class="tldr-ic">✨</span> The big picture — plain-language takeaways
    <span class="tldr-chev">▾</span>
  </button>
  <div id="tldrPanel" class="tldr-panel" hidden></div>

  <div class="toolbar">
    <input type="search" id="q" placeholder="Filter by title, journal, author, keyword…" autocomplete="off">
    <div class="seg" id="filter">
      <button data-f="all" class="on">All</button>
      <button data-f="new">New</button>
      <button data-f="peer">Peer-reviewed</button>
      <button data-f="preprint">Preprints</button>
    </div>
  </div>

  <div class="count" id="count"></div>
  <div id="list"><p class="sub" style="margin-top:30px">Loading papers…</p></div>

  <footer id="foot"></footer>
</div>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d){ if(!d) return ""; const [y,m,da]=d.split("-").map(Number);
  return MON[(m||1)-1] + (da?(" "+da):"") + " " + y; }

let PAPERS = [], FILTER = "all", LATEST_RUN = null;

function matchesFilter(p){
  if(FILTER==="new") return p.first_seen===LATEST_RUN;
  if(FILTER==="peer") return !p.is_preprint;
  if(FILTER==="preprint") return p.is_preprint;
  return true;
}
function matchesQuery(p,q){
  if(!q) return true;
  return (p.title+" "+p.journal+" "+p.authors+" "+(p.summary||"")+" "+(p.abstract||""))
    .toLowerCase().includes(q);
}

function render(){
  const q = $("#q").value.trim().toLowerCase();
  const rows = PAPERS.filter(p => matchesFilter(p) && matchesQuery(p,q));
  $("#count").textContent = rows.length + " of " + PAPERS.length + " papers";
  if(!rows.length){ $("#list").innerHTML = '<p class="sub" style="margin-top:24px">No papers match.</p>'; return; }
  $("#list").innerHTML = rows.map(p => {
    const isNew = p.first_seen===LATEST_RUN;
    const badges =
      (isNew ? '<span class="badge new">New</span>' : '') +
      (p.is_preprint ? '<span class="badge pre">Preprint</span>' : '');
    const src = p.summary_by==="claude" ? "AI summary" :
                p.summary_by==="abstract" ? "Abstract excerpt" : "";
    return `<div class="card">
      <h3><a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a></h3>
      <div class="meta">
        ${p.journal ? '<span class="j">'+esc(p.journal)+'</span>' : ''}
        ${p.date ? '<span>· '+fmtDate(p.date)+'</span>' : ''}
        ${badges}
      </div>
      ${p.summary ? '<p class="summary">'+esc(p.summary)+'</p>' : ''}
      ${src ? '<div class="src">'+src+'</div>' : ''}
      ${p.abstract ? '<details><summary>Abstract</summary><div class="abstract">'+esc(p.abstract)+'</div></details>' : ''}
      ${p.authors ? '<div class="authors">'+esc(p.authors)+'</div>' : ''}
    </div>`;
  }).join("");
}

fetch("data.json?_=" + Date.now()).then(r => r.json()).then(d => {
  PAPERS = d.papers || [];
  if(d.description) $("#sub").textContent = d.description;
  renderTldr(d.overview);
  LATEST_RUN = PAPERS.reduce((m,p) => (p.first_seen>m ? p.first_seen : m), "");
  const newCount = PAPERS.filter(p => p.first_seen===LATEST_RUN).length;
  const preCount = PAPERS.filter(p => p.is_preprint).length;
  $("#kpis").innerHTML =
    `<div class="kpi"><div class="v">${PAPERS.length}</div><div class="l">Papers tracked</div></div>
     <div class="kpi"><div class="v">${newCount}</div><div class="l">New this run</div></div>
     <div class="kpi"><div class="v">${preCount}</div><div class="l">Preprints</div></div>`;
  const updated = d.updated ? new Date(d.updated).toLocaleString() : "—";
  $("#foot").innerHTML =
    `Source: ${esc(d.source||"Europe PMC")} · query: ${esc(d.query_human||"CTCL")}<br>` +
    `Updated ${esc(updated)} · refreshed weekly by GitHub Actions · ` +
    `<a href="https://hlash99.github.io/">hlash99 dashboard</a>`;
  render();
}).catch(e => {
  $("#list").innerHTML = '<p class="err">Could not load data.json — '+esc(String(e))+'</p>';
});

/* ── plain-language "big picture" takeaways ──
   The server regenerates the bullets weekly IF an ANTHROPIC_API_KEY secret is
   set on the repo. Until then (or to refresh on demand), paste a key via the
   "AI key" link and the browser calls Claude directly to re-synthesize them —
   the result is cached in this browser and shown in place of the seeded set. */
let SERVER_OV=null;
function currentOverview(server){
  let cache=null; try{cache=JSON.parse(localStorage.getItem("ctclOverviewCache")||"null");}catch(e){}
  // prefer a browser-regenerated overview when it covers at least as many papers
  if(cache && cache.bullets && cache.bullets.length && (!server || (cache.n_papers||0)>=(server.n_papers||0)))
    return Object.assign({by:"your key"}, cache);
  return server;
}
function renderTldr(server){
  if(server) SERVER_OV=server;
  const btn=$("#tldrBtn"), panel=$("#tldrPanel");
  const ov=currentOverview(SERVER_OV);
  if(!ov || !Array.isArray(ov.bullets) || !ov.bullets.length){ btn.style.display="none"; return; }
  const keySet=!!localStorage.getItem("anthropic_key");
  const nNew=Math.max(0, PAPERS.length-(ov.n_papers||0));
  panel.innerHTML = "<ul>"+ov.bullets.map(b=>`<li>${esc(b)}</li>`).join("")+"</ul>"+
    `<div class="tldr-cap">Synthesis of the ${ov.n_papers||PAPERS.length} most recent papers${
      ov.generated?" · "+fmtDate(ov.generated):""}${ov.by?" · "+esc(ov.by):""} · AI-generated, not medical advice.`+
    (nNew?` <b style="color:var(--accent)">${nNew} new since this summary.</b>`:"")+
    ` · <a class="tldr-act" onclick="regenTakeaways()">↻ regenerate</a>`+
    ` · <a class="tldr-act" onclick="manageAiKey()">⚙ AI key${keySet?" ✓":""}</a></div>`;
  btn.style.display="flex";
  let open; try{open=localStorage.getItem("ctclTldr");}catch(e){}
  setTldr(open===null||open===undefined ? true : open==="1");
  btn.onclick=()=>{ const willOpen=panel.hidden; setTldr(willOpen);
    try{localStorage.setItem("ctclTldr", willOpen?"1":"0");}catch(e){} };
}
function setTldr(open){
  $("#tldrPanel").hidden=!open;
  const btn=$("#tldrBtn");
  btn.setAttribute("aria-expanded", open?"true":"false");
  btn.style.borderRadius = open ? "12px 12px 0 0" : "12px";
}

const OVERVIEW_SYSTEM =
  "You write a plain-language 'big picture' briefing on recent cutaneous T-cell "+
  "lymphoma (CTCL) research for a smart, non-medical reader following the field "+
  "closely — a patient or a family member, NOT a doctor. Given a list of recent "+
  "papers (titles + short summaries), synthesize the MOST IMPORTANT cross-cutting "+
  "themes: emerging treatments, diagnostic advances, shifts in understanding, and "+
  "practical cautions. Rules: AT MOST 5 bullets; each a single plain-English "+
  "sentence; no jargon (briefly gloss any unavoidable term); group related "+
  "findings rather than listing papers one by one; lead with what matters most to "+
  "a patient. Respond with ONLY a JSON array of bullet strings, nothing else.";

async function callClaudeOverview(){
  const key=localStorage.getItem("anthropic_key");
  const recent=PAPERS.slice().sort((a,b)=>
    ((b.date||"")+(b.first_seen||"")).localeCompare((a.date||"")+(a.first_seen||""))).slice(0,18);
  const lines=recent.map(p=>`- ${p.title} (${p.journal||""}, ${(p.date||"").slice(0,7)}): `+
    (p.summary||p.abstract||"").slice(0,400)).join("\n");
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"content-type":"application/json","x-api-key":key,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-opus-4-8",max_tokens:1024,system:OVERVIEW_SYSTEM,
      messages:[{role:"user",content:"Recent CTCL papers:\n\n"+lines}]})});
  const j=await r.json();
  if(j.error) throw new Error(j.error.message||("HTTP "+r.status));
  let text=(j.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("").trim();
  text=text.replace(/^```(?:json)?/,"").replace(/```$/,"").trim();
  let bullets; try{bullets=JSON.parse(text);}
  catch(e){bullets=text.split("\n").map(l=>l.replace(/^[-*•\d.\s]+/,"").trim()).filter(Boolean);}
  return bullets.map(b=>String(b).trim()).filter(Boolean).slice(0,5);
}
function manageAiKey(){
  const cur=localStorage.getItem("anthropic_key");
  if(cur && !confirm("An Anthropic API key is already stored in this browser.\nOK = replace it · Cancel = keep it.")) return;
  const v=prompt("Paste an Anthropic API key (sk-ant-…) to regenerate the takeaways from THIS browser.\n"+
    "Stored only in this browser's localStorage; used only for your own request to Anthropic.\n"+
    "Note: a browser-stored key can incur usage cost if leaked — clear it when done. Leave blank to clear.");
  if(v===null) return;
  if(v.trim()==="") localStorage.removeItem("anthropic_key"); else localStorage.setItem("anthropic_key", v.trim());
  renderTldr();
}
async function regenTakeaways(){
  if(!localStorage.getItem("anthropic_key")){ manageAiKey(); return; }
  const cap=$("#tldrPanel").querySelector(".tldr-cap");
  if(cap) cap.innerHTML='<span style="color:var(--muted)">Regenerating from the latest papers…</span>';
  try{
    const bullets=await callClaudeOverview();
    if(!bullets.length) throw new Error("no bullets returned");
    localStorage.setItem("ctclOverviewCache", JSON.stringify(
      {bullets, generated:new Date().toISOString().slice(0,10), n_papers:PAPERS.length}));
    renderTldr();
  }catch(e){ if(cap) cap.innerHTML='<span class="err">Regenerate failed: '+esc(e.message||String(e))+'</span>'; }
}

$("#q").addEventListener("input", render);
$("#filter").addEventListener("click", e => {
  const b = e.target.closest("button"); if(!b) return;
  FILTER = b.dataset.f;
  [...$("#filter").children].forEach(x => x.classList.toggle("on", x===b));
  render();
});
</script>
</body>
</html>
